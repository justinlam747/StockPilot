name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [rubocop, eslint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        if: matrix.check == 'rubocop'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node
        if: matrix.check == 'eslint' || matrix.check == 'typecheck'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        if: matrix.check == 'eslint' || matrix.check == 'typecheck'
        run: npm ci

      - name: RuboCop
        if: matrix.check == 'rubocop'
        run: bundle exec rubocop

      - name: ESLint
        if: matrix.check == 'eslint'
        run: npx eslint frontend/

      - name: TypeScript type check
        if: matrix.check == 'typecheck'
        run: npx tsc --noEmit

  security:
    name: Security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [bundler-audit, npm-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        if: matrix.check == 'bundler-audit'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node
        if: matrix.check == 'npm-audit'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: bundler-audit
        if: matrix.check == 'bundler-audit'
        run: |
          gem install bundler-audit
          bundle-audit check --update

      - name: npm audit
        if: matrix.check == 'npm-audit'
        run: npm audit --audit-level=high

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint, security]
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/shopify_inventory_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shopify_inventory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:create db:migrate

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npx vite build

      - name: Docker build
        run: docker build -t shopify-inventory:ci .
