name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop

  security:
    name: Security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [bundler-audit, brakeman]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: bundler-audit
        if: matrix.check == 'bundler-audit'
        run: |
          gem install bundler-audit
          # GHSA-p9fm-f462-ggrg: Active Storage DoS in proxy mode — app does not
          # use Active Storage, so this advisory is not exploitable here.
          bundle-audit check --update --ignore GHSA-p9fm-f462-ggrg

      - name: Brakeman static analysis
        if: matrix.check == 'brakeman'
        run: bundle exec brakeman --no-pager -q

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/shopify_inventory_test
      REDIS_URL: redis://localhost:6379/0
      SHOPIFY_API_KEY: test_key
      SHOPIFY_API_SECRET: test_secret
      ANTHROPIC_API_KEY: test_key
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shopify_inventory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:create db:migrate

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
