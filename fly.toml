# Fly.io app config. Run `fly launch --no-deploy` once to create the app, then `fly deploy`.
# Postgres + Redis are external (Neon and Upstash) — wire DATABASE_URL and REDIS_URL via `fly secrets set`.

app = "stockpilot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"
  PORT = "3000"

[processes]
  web = "./bin/rails server -b 0.0.0.0 -p 3000"
  worker = "bundle exec sidekiq -C config/sidekiq.yml"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]

[deploy]
  release_command = "./bin/rails db:prepare"
